<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#dc2626"/>
  
  <!-- Inner white circle -->
  <circle cx="50" cy="50" r="40" fill="white"/>
  
  <!-- Face outline -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Turban/head wrap -->
  <path d="M 20 35 Q 50 25, 80 35 L 80 40 Q 50 30, 20 40 Z" fill="#dc2626"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="48" r="3" fill="#dc2626"/>
  <circle cx="60" cy="48" r="3" fill="#dc2626"/>
  
  <!-- Mustache -->
  <path d="M 35 58 Q 50 62, 65 58" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- CBKM Text -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#dc2626" text-anchor="middle">CBKM</text>
</svg>
